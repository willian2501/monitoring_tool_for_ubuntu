<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Linux Host Monitor Preview</title>
  <desc id="desc">Illustrated preview of a monitoring dashboard with summary cards, charts, and container status panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1410" cy="130" r="220" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="180" cy="760" r="260" fill="#22c55e" opacity="0.08"/>

  <rect x="90" y="70" width="1420" height="760" rx="28" fill="#0b1220" stroke="#1f2937" stroke-width="2" filter="url(#shadow)"/>
  <rect x="90" y="70" width="1420" height="92" rx="28" fill="#111827"/>
  <rect x="90" y="134" width="1420" height="28" fill="#111827"/>

  <circle cx="128" cy="116" r="10" fill="#ef4444"/>
  <circle cx="158" cy="116" r="10" fill="#f59e0b"/>
  <circle cx="188" cy="116" r="10" fill="#22c55e"/>

  <text x="250" y="124" fill="#e5e7eb" font-size="34" font-family="Arial, sans-serif" font-weight="700">Linux Host Monitor</text>
  <rect x="1210" y="96" width="220" height="38" rx="19" fill="#0f766e" opacity="0.95"/>
  <text x="1263" y="121" fill="#ecfeff" font-size="20" font-family="Arial, sans-serif">Live every 30s</text>

  <rect x="130" y="200" width="290" height="130" rx="22" fill="#111827" stroke="#1f2937"/>
  <rect x="450" y="200" width="290" height="130" rx="22" fill="#111827" stroke="#1f2937"/>
  <rect x="770" y="200" width="290" height="130" rx="22" fill="#111827" stroke="#1f2937"/>
  <rect x="1090" y="200" width="290" height="130" rx="22" fill="#111827" stroke="#1f2937"/>

  <text x="160" y="240" fill="#93c5fd" font-size="20" font-family="Arial, sans-serif">CPU Usage</text>
  <text x="160" y="295" fill="#f8fafc" font-size="50" font-family="Arial, sans-serif" font-weight="700">31%</text>
  <text x="160" y="318" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">8 cores • healthy</text>

  <text x="480" y="240" fill="#86efac" font-size="20" font-family="Arial, sans-serif">Memory</text>
  <text x="480" y="295" fill="#f8fafc" font-size="50" font-family="Arial, sans-serif" font-weight="700">5.4 GB</text>
  <text x="480" y="318" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">of 16 GB used</text>

  <text x="800" y="240" fill="#67e8f9" font-size="20" font-family="Arial, sans-serif">Running Containers</text>
  <text x="800" y="295" fill="#f8fafc" font-size="50" font-family="Arial, sans-serif" font-weight="700">9 / 9</text>
  <text x="800" y="318" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">fresh snapshot</text>

  <text x="1120" y="240" fill="#fda4af" font-size="20" font-family="Arial, sans-serif">5xx Errors</text>
  <text x="1120" y="295" fill="#f8fafc" font-size="50" font-family="Arial, sans-serif" font-weight="700">12</text>
  <text x="1120" y="318" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">last hour</text>

  <rect x="130" y="370" width="740" height="240" rx="24" fill="#111827" stroke="#1f2937"/>
  <rect x="900" y="370" width="480" height="240" rx="24" fill="#111827" stroke="#1f2937"/>

  <text x="160" y="410" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">CPU and Memory</text>
  <text x="930" y="410" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Top Containers</text>

  <polyline fill="none" stroke="url(#hero)" stroke-width="6" points="170,560 230,520 290,535 350,470 410,500 470,430 530,452 590,398 650,430 710,380 770,420 830,360"/>
  <polyline fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.85" points="170,540 230,560 290,515 350,520 410,480 470,500 530,470 590,488 650,450 710,460 770,430 830,445"/>

  <rect x="930" y="438" width="420" height="42" rx="14" fill="#0f172a"/>
  <rect x="930" y="492" width="420" height="42" rx="14" fill="#0f172a"/>
  <rect x="930" y="546" width="420" height="42" rx="14" fill="#0f172a"/>

  <circle cx="960" cy="459" r="8" fill="#22c55e"/>
  <circle cx="960" cy="513" r="8" fill="#22c55e"/>
  <circle cx="960" cy="567" r="8" fill="#f59e0b"/>

  <text x="985" y="466" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">edge-caddy</text>
  <text x="1260" y="466" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">healthy • 2.1% CPU</text>

  <text x="985" y="520" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">raceweek_api</text>
  <text x="1230" y="520" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">healthy • 4.8% CPU</text>

  <text x="985" y="574" fill="#f8fafc" font-size="20" font-family="Arial, sans-serif">mysql-server</text>
  <text x="1216" y="574" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">aging • 8.3% CPU</text>

  <rect x="130" y="650" width="1250" height="130" rx="24" fill="#111827" stroke="#1f2937"/>
  <text x="160" y="690" fill="#e5e7eb" font-size="24" font-family="Arial, sans-serif" font-weight="700">Storage, Logs, and Top Processes</text>
  <text x="160" y="730" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif">Largest folders • Largest files • Important log entries • Live tails • Top processes</text>
  <rect x="1030" y="692" width="300" height="34" rx="17" fill="#164e63"/>
  <text x="1085" y="715" fill="#cffafe" font-size="18" font-family="Arial, sans-serif">Admin-only dashboard</text>
</svg>
